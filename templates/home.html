<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Performance Predictor</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        .container{
            width:450px;
            margin:40px auto;
            background:#fff;
            padding:25px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
            font-weight:bold;
        }

        select,input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:15px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            color:green;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Student Exam Performance Predictor</h2>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select your Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <label>Race or Ethnicity</label>
        <select name="race_ethnicity" required>
            <option value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
        </select>

        <label>Parental Level of Education</label>
        <select name="parental_level_of_education" required>
            <option value="">Select Parent Education</option>
            <option value="some high school">Some High School</option>
            <option value="high school">High School</option>
            <option value="some college">Some College</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="master's degree">Master's Degree</option>
        </select>

        <label>Lunch Type</label>
        <select name="lunch" required>
            <option value="">Select Lunch Type</option>
            <option value="standard">Standard</option>
            <option value="free/reduced">Free/Reduced</option>
        </select>

        <label>Test Preparation Course</label>
        <select name="test_preparation_course" required>
            <option value="">Select Test Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
        </select>

        <label>Writing Score out of 100</label>
        <input type="number"
               name="writing_score"
               placeholder="Enter your Writing Score"
               min="0"
               max="100"
               required>

        <label>Reading Score out of 100</label>
        <input type="number"
               name="reading_score"
               placeholder="Enter your Reading Score"
               min="0"
               max="100"
               required>

        <button type="submit">Predict Math Score</button>

    </form>

    <div class="result">
        THE prediction is {{results}}
    </div>

</div>

</body>
</html>
